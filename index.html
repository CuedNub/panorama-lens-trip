<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Panorama Lens Trip</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- SIDEBAR OVERLAY -->
  <div id="sidebarOverlay" onclick="Engine.toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- BANNER BACKUP -->
  <div id="bannerBackup"></div>

  <!-- LOCKSCREEN LISENSI -->
  <div id="licenseLockscreen">
    <div class="lock-logo" onclick="License.handleLogoClick()">🌿</div>
    <div class="lock-title" id="lockTitle">Panorama Lens Trip</div>
    <div class="lock-msg" id="lockMsg">Lisensi Tidak Aktif</div>
    <div>
      <button class="lock-btn lock-btn-primary"
        onclick="License.bukaFormInput()">🔑 Input Lisensi</button>
      <button class="lock-btn lock-btn-secondary"
        onclick="DataSync.exportData()">💾 Export Data</button>
    </div>
  </div>

  <!-- KONTEN UTAMA -->
  <div id="konten"></div>

  <!-- MODAL -->
  <div id="modal"></div>

  <!-- POPUP UPDATE -->
  <div id="updatePopup"></div>

  <!-- BOTTOM NAVIGATION -->
  <div id="bottomNav"></div>

  <!-- LOAD JS -->
  <script src="js/core.js"></script>
  <script src="js/license.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/data_sync.js"></script>
  <script src="js/app_update.js"></script>

  <!-- INIT APP -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Init update checker dulu agar PWA tetap bisa diinstal
      if (window.AppUpdate) {
        AppUpdate.init();
      }

      // Blok mode browser biasa, izinkan hanya mode app terinstal
      var isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true ||
        document.referrer.indexOf('android-app://') === 0;

      if (!isStandalone) {
        document.body.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f0fdf4;font-family:Arial,sans-serif">' +
            '<div style="max-width:420px;width:100%;background:#ffffff;border:1px solid #dcfce7;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,0.08);text-align:center">' +
              '<div style="font-size:46px;margin-bottom:12px">📲</div>' +
              '<h2 style="margin:0 0 12px;color:#166534">Bukak liwat aplikasi wae</h2>' +
              '<p style="margin:0 0 10px;color:#374151;line-height:1.6">Panorama Lens Trip mung isa digawe liwat aplikasi teka Cued.</p>' +
              '<p style="margin:0 0 16px;color:#6b7280;font-size:14px;line-height:1.5">Spurane gik nana <b>waktu</b> karo <b>mood</b>.</p>' +
              '<div style="font-size:13px;color:#6b7280;line-height:1.5">gawe mode browser.</div>' +
            '</div>' +
          '</div>';
        return;
      }

      // Apply tema dulu
      if (window.Engine) {
        Engine.applyTema();
        Engine.renderHeader();
      }

      // Cek lisensi
      if (window.License) {
        var licenseOk = License.init();
        if (!licenseOk) return;
      }

      // Init engine (full)
      if (window.Engine) {
        Engine.init();
      }

      // Cek backup reminder
      if (window.DataSync) {
        DataSync.cekReminder();
      }
    });
  </script>

</body>
</html>
